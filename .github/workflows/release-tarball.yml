name: Create Release Tarball

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install GitHub CLI
      run: sudo apt-get update && sudo apt-get install -y gh zip

    - name: Create archives for each theme directory
      run: |
        for d in */ ; do
          dir=${d%/}
          # gzip
          tar -czf "$dir.tar.gz" "$dir"
          # xz
          tar -cJf "$dir.tar.xz" "$dir"
          # zip
          zip -r "$dir.zip" "$dir"
        done

    - name: Upload artifacts (all formats)
      uses: actions/upload-artifact@v4
      with:
        name: theme-archives
        path: |
          *.tar.gz
          *.tar.xz
          *.zip

    - name: Create or update GitHub Release for main
      if: github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view latest || gh release create latest --title "latest" --notes "Latest main branch archives"
        gh release upload latest *.tar.gz *.tar.xz *.zip --clobber

    - name: Create or update GitHub Release for tags
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag="${GITHUB_REF#refs/tags/}"
        gh release view "$tag" || gh release create "$tag" --title "$tag" --notes "Release $tag"
        gh release upload "$tag" *.tar.gz *.tar.xz *.zip --clobber
